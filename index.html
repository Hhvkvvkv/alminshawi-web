<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>القرآن الكريم - القارئ الشيخ محمد صديق المنشاوي</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header>
    <img src="sheikh.jpg" alt="الشيخ المنشاوي" class="sheikh-photo">
    <h1>القرآن الكريم</h1>
    <p class="surah-count">القارئ الشيخ محمد صديق المنشاوي</p>
    <div class="gold-divider"></div>
    <button id="btnDownloads" class="downloads-btn">
      <i class="fas fa-download"></i>
    </button>
    <p class="downloads-label">السور المحملة</p>
  </header>

  <div class="search-container">
    <i class="fas fa-search search-icon"></i>
    <input type="text" id="searchInput" placeholder="ابحث عن سورة..." class="search-input">
  </div>

  <div id="surahList" class="surah-list"></div>

  <div class="bottom-spacer"></div>
</div>

<div id="player" class="player-hidden">
  <div class="player-progress-container">
    <input type="range" id="seekbar" class="seekbar" value="0" min="0" max="100" step="0.1">
  </div>
  <div class="player-content">
    <div class="player-info">
      <span id="currentSurahName" class="player-surah-name">الفاتحة</span>
      <div class="player-times">
        <span id="currentTime">00:00</span>
        <span id="duration">00:00</span>
      </div>
    </div>
    <div class="player-controls">
      <button id="prevBtn" class="control-btn"><i class="fas fa-step-backward"></i></button>
      <button id="playBtn" class="control-btn play-btn"><i class="fas fa-play"></i></button>
      <button id="nextBtn" class="control-btn"><i class="fas fa-step-forward"></i></button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="app.js"></script>
</body>
</html>
